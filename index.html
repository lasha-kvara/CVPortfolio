<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lasha Kvaratskhelia | Senior QA Automation Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        scrollbar-width: thin;
        scrollbar-color: #2dd4bf #0f172a;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #1e293b;
        border-radius: 20px;
        border: 2px solid #0f172a;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: #2dd4bf;
      }
      .spotlight {
        background: radial-gradient(800px circle at var(--x) var(--y), rgba(45, 212, 191, 0.08), transparent 80%);
      }
      .text-glow {
        text-shadow: 0 0 20px rgba(45, 212, 191, 0.3);
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      #scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        background: #2dd4bf;
        z-index: 100;
        transition: width 0.1s ease-out, opacity 0.3s ease-in-out;
        pointer-events: none;
      }
      @keyframes pulse-soft {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.95); }
      }
      .animate-pulse-soft {
        animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
